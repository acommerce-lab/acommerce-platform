<body>
    <div id="app">
        <div style="display:flex; align-items:center; justify-content:center; min-height:60vh; font-family:Cairo,sans-serif;">
            جارٍ تحميل إيجار…
        </div>
    </div>

    <div id="blazor-error-ui" style="display:none">
        حدث خطأ غير متوقع.
        <a href="" class="reload">أعد التحميل</a>
        <a class="dismiss">🗙</a>
    </div>

    <!-- Cache-busting: ?v=YYYYMMDD يجبر المتصفّح على إعادة الجلب بعد كل
         نشر بدل قراءة نسخة قديمة من cache المتصفّح أو الـ CDN. ارفع
         الرقم عند تعديل أيّ من السكربتات الثلاثة.

         version-check.js أوّلاً ودائماً — يفحص version.json قبل أي شيء
         آخر، يفرض حذف SW + caches إذا كانت النسخة المحفوظة محلياً قديمة،
         ثم يعيد التحميل ضارباً عرض الحائط بأي cache على CDN/proxy. -->
    <script src="version-check.js?v=20260430m"></script>
    <script src="api-diagnostics.js?v=20260430m"></script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/Ejar.Customer.UI/ui-prefs.js"></script>
    <script src="_content/Ejar.Customer.UI/image-compressor.js"></script>
    <script src="_content/Ejar.Customer.UI/notifications.js"></script>
    <script src="install-prompt.js?v=20260430m"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js"
            integrity="sha512-7SRCYIJtR6F8ocwW7UxW6wGKqbSyqREDbfCORCbGLatU0iugBLwyOXpzhkPyHIFdBO0K2VCu57fvP2Twgx1o2A=="
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <script>
      // SW registration + auto-update عند نشر إصدار جديد:
      // إذا تغيّر VERSION داخل service-worker.js → نُجبر تحديث + reload.
      // updateViaCache: 'none' يمنع متصفّحات Chrome/Edge من خدمة الـ SW القديم
      // من HTTP cache — يُجبر استعلام الشبكة كلّ مرّة، فلا يبقى SW مكسور
      // عالقاً عبر النشرات.
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' })
          .then(reg => {
            // افحص التحديثات كل 60 ثانية + عند العودة للتبويب
            setInterval(() => reg.update(), 60_000);
            document.addEventListener('visibilitychange', () => {
              if (!document.hidden) reg.update();
            });
            reg.addEventListener('updatefound', () => {
              const sw = reg.installing;
              if (!sw) return;
              sw.addEventListener('statechange', () => {
                if (sw.state === 'installed' && navigator.serviceWorker.controller) {
                  // SW جديد جاهز ⟶ خذ السيطرة وأعد التحميل
                  sw.postMessage('skipWaiting');
                }
              });
            });
            let reloaded = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
              if (reloaded) return;
              reloaded = true;
              window.location.reload();
            });
          });
      }
    </script>
</body>

</html>
