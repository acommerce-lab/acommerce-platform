# Order — single-command bring-up
#
#   docker compose -f Apps/Order.Web2/docker-compose.yml up --build
#
# Then open http://localhost:5701  (Sign in with +966500000001).
# Stop with Ctrl+C; data persists in ./_data/order.db.

services:
  order-api2:
    build:
      context: ../..
      dockerfile: Apps/Order.Api2/Dockerfile
    image: order-api2:dev
    container_name: order-api2
    environment:
      - ASPNETCORE_URLS=http://+:5101
      - ASPNETCORE_ENVIRONMENT=Production
      - Database__Provider=SQLite
      - Database__ConnectionString=Data Source=data/order.db
      - JWT__SecretKey=please-change-this-32-characters-long-secret!
    ports:
      - "5101:5101"
    volumes:
      - ./_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:5101/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  order-web2:
    build:
      context: ../..
      dockerfile: Apps/Order.Web2/Dockerfile
    image: order-web2:dev
    container_name: order-web2
    depends_on:
      order-api2:
        condition: service_healthy
    environment:
      - ASPNETCORE_URLS=http://+:5701
      - ASPNETCORE_ENVIRONMENT=Production
      - OrderApi__BaseUrl=http://order-api2:5101
    ports:
      - "5701:5701"
